name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS deps
        run: timeout 10m pnpm install --frozen-lockfile

      - name: Install Python dev tooling
        run: |
          timeout 5m python -m pip install --upgrade pip
          timeout 10m pip install ruff black mypy pytest

      - name: Lint
        run: timeout 15m scripts/lint-all.sh

      - name: Test
        run: timeout 20m scripts/test-all.sh

      - name: Build checks
        run: timeout 20m pnpm build
