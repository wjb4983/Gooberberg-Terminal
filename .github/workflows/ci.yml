name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  fast-pr-lane:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS deps
        run: timeout 10m pnpm install --frozen-lockfile

      - name: Install Python dev tooling
        run: |
          timeout 5m python -m pip install --upgrade pip
          timeout 10m pip install ruff black mypy pytest

      - name: Lint
        run: timeout 15m scripts/lint-all.sh

      - name: Unit tests
        run: timeout 15m scripts/test-all.sh

      - name: Timeout wrapper policy
        run: timeout 60s python scripts/check-ci-timeout-wrappers.py

      - name: Replay and fault-injection tests
        run: timeout 15m scripts/test-replay-faults.sh

      - name: Training metadata consistency
        run: timeout 3m python scripts/check-training-model-metadata-consistency.py

      - name: Connectivity layered smoke
        run: timeout 15m scripts/test-connectivity-layered.sh

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fast-pr-failure-artifacts
          retention-days: 7
          if-no-files-found: ignore
          path: |
            artifacts/logs/**
            artifacts/traces/**
            artifacts/screenshots/**

  release-connectivity-smoke:
    if: github.event_name != 'schedule' && (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.base_ref, 'release/'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true # advisory now; make mandatory next release

    strategy:
      fail-fast: false
      matrix:
        topology: [localhost, tailscale, reverse-proxy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run synthetic connectivity smoke
        env:
          TOPOLOGY: ${{ matrix.topology }}
          LOCALHOST_BASE_URL: ${{ vars.LOCALHOST_BASE_URL }}
          TAILSCALE_BASE_URL: ${{ vars.TAILSCALE_BASE_URL }}
          REVERSE_PROXY_BASE_URL: ${{ vars.REVERSE_PROXY_BASE_URL }}
        run: |
          timeout 90s scripts/ops/run-connectivity-smoke-matrix.sh

  nightly-matrix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        topology: [localhost, tailscale, reverse-proxy]
        auth_mode: [bearer-jwt, device-bound-token]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS deps
        run: timeout 10m pnpm install --frozen-lockfile

      - name: Install Python dev tooling
        run: |
          timeout 5m python -m pip install --upgrade pip
          timeout 10m pip install ruff black mypy pytest

      - name: Connectivity layered full suite
        run: timeout 25m scripts/test-connectivity-layered.sh

      - name: Run synthetic connectivity checks
        env:
          TOPOLOGY: ${{ matrix.topology }}
          LOCALHOST_BASE_URL: ${{ vars.LOCALHOST_BASE_URL }}
          TAILSCALE_BASE_URL: ${{ vars.TAILSCALE_BASE_URL }}
          REVERSE_PROXY_BASE_URL: ${{ vars.REVERSE_PROXY_BASE_URL }}
        run: timeout 10m scripts/ops/run-connectivity-smoke-matrix.sh

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-failure-${{ matrix.topology }}-${{ matrix.auth_mode }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            artifacts/logs/**
            artifacts/traces/**
            artifacts/screenshots/**
