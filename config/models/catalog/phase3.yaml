- model_family: timesfm_foundation_forecaster
  model_name: TimesFM Foundation Forecaster
  description: Decoder-only foundation model for zero-shot and light fine-tuned long-horizon time-series forecasting.
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - known_future_covariates
    - calendar.market_sessions
  tags:
    - foundation-model
    - deep-learning
    - forecasting
  leakage_risks:
    - pretraining_corpus_overlap_with_eval
    - covariate_timestamp_alignment_error
  failure_modes:
    - weak_domain_transfer_on_sparse_series
    - unstable_extreme_quantile_behavior
  compute_intensity: high
  output_schema: forecast.quantiles.v1
  references:
    - https://arxiv.org/abs/2310.10688
    - https://github.com/google-research/timesfm

- model_family: mamba_state_space_forecaster
  model_name: Mamba State Space Forecaster
  description: Selective state-space forecaster designed for long-context sequence modeling with linear-time scaling.
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - observed_covariates
    - static_covariates
  tags:
    - state-space
    - deep-learning
    - long-horizon
  leakage_risks:
    - context_window_future_overlap
    - scaler_fit_on_validation_tail
  failure_modes:
    - sensitivity_to_sequence_chunking
    - degraded_short_context_precision
  compute_intensity: high
  output_schema: forecast.quantiles.v1
  references:
    - https://arxiv.org/abs/2312.00752
    - https://github.com/state-spaces/mamba

- model_family: tabpfn_meta_classifier
  model_name: TabPFN Meta Classifier
  description: Prior-data fitted transformer for fast tabular probabilistic classification under low-data regimes.
  required_data:
    - target.class
    - features.tabular
  optional_data:
    - class_weights
    - fold.assignment
  tags:
    - meta-learning
    - transformer
    - classification
  leakage_risks:
    - fold_assignment_contamination
    - imputation_statistics_leakage
  failure_modes:
    - degraded_performance_on_wide_tables
    - calibration_shift_under_domain_change
  compute_intensity: medium
  output_schema: classification.class_probabilities.v1
  references:
    - https://www.nature.com/articles/s41586-024-08328-6
    - https://github.com/PriorLabs/TabPFN

- model_family: neural_prophet_hybrid
  model_name: NeuralProphet Hybrid
  description: Hybrid additive and neural autoregressive forecaster for trend-seasonality decomposition with exogenous signals.
  required_data:
    - timestamp
    - target.value
  optional_data:
    - holiday.calendar
    - regressors.exogenous
  tags:
    - hybrid
    - forecasting
    - seasonality
  leakage_risks:
    - future_regressor_backfill_leakage
    - changepoint_tuning_on_holdout
  failure_modes:
    - overfitting_with_dense_events
    - unstable_trend_break_detection
  compute_intensity: medium
  output_schema: decomposition.trend_seasonal_residual.v1
  references:
    - https://neuralprophet.com/
    - https://github.com/ourownstory/neural_prophet

- model_family: darts_nhits_multi_horizon
  model_name: Darts N-HiTS Multi-Horizon
  description: Hierarchical interpolation forecaster for multi-horizon predictions with strong long-range accuracy.
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - known_future_covariates
    - event_flags
  tags:
    - deep-learning
    - forecasting
    - multi-horizon
  leakage_risks:
    - horizon_specific_feature_shift_leakage
    - rolling_origin_overlap
  failure_modes:
    - horizon_coupling_instability
    - underfit_on_high_frequency_spikes
  compute_intensity: high
  output_schema: forecast.quantiles.v1
  references:
    - https://arxiv.org/abs/2201.12886
    - https://unit8co.github.io/darts/generated_api/darts.models.forecasting.nhits.html

- model_family: skforecast_gradient_boosting
  model_name: Skforecast Gradient Boosting
  description: Recursive and direct tabularized forecasting with gradient boosters and lag-feature pipelines.
  required_data:
    - timestamp
    - target.value
  optional_data:
    - observed_covariates
    - holiday.calendar
  tags:
    - tree-based
    - forecasting
    - tabular
  leakage_risks:
    - lag_matrix_future_row_inclusion
    - global_encoder_fit_leakage
  failure_modes:
    - recursive_error_accumulation
    - lag_set_instability_under_shift
  compute_intensity: medium
  output_schema: forecast.point_and_interval.v1
  references:
    - https://skforecast.org/
    - https://scikit-learn.org/stable/modules/ensemble.html

- model_family: bsts_causal_impact_model
  model_name: BSTS Causal Impact Model
  description: Bayesian structural model for counterfactual impact estimation with posterior effect distributions.
  required_data:
    - timestamp
    - target.value
    - intervention.flag
  optional_data:
    - control_series.values
    - holiday.calendar
  tags:
    - bayesian
    - causal
    - time-series
  leakage_risks:
    - post_intervention_covariate_peek
    - retrospective_intervention_relabeling
  failure_modes:
    - weak_counterfactual_identifiability
    - sensitivity_to_prior_selection
  compute_intensity: medium
  output_schema: causal_effect.posterior.v1
  references:
    - https://research.google/pubs/pub41854/
    - https://google.github.io/CausalImpact/CausalImpact.html

- model_family: pytorch_tabnet_regressor
  model_name: PyTorch TabNet Regressor
  description: Sequential attention tabular regressor balancing sparse feature selection and non-linear prediction.
  required_data:
    - target.value
    - features.tabular
  optional_data:
    - sample_weight
    - entity_id
  tags:
    - deep-learning
    - tabular
    - regression
  leakage_risks:
    - target_dependent_preprocessing_leakage
    - entity_fold_contamination
  failure_modes:
    - unstable_training_on_small_batches
    - feature_mask_collapse
  compute_intensity: medium
  output_schema: forecast.point.v1
  references:
    - https://arxiv.org/abs/1908.07442
    - https://dreamquark-ai.github.io/tabnet/

