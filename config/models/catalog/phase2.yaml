- model_family: xgboost_intraday_momentum
  model_name: XGBoost Intraday Momentum
  description: Gradient-boosted intraday momentum model for short-horizon continuation signals.
  required_data:
    - returns.intraday_1m
    - volume.intraday_1m
    - timestamp
    - symbol
  dataset_requirement:
    required_fields:
      - returns.intraday_1m
      - volume.intraday_1m
      - quote.mid.intraday_1m
    required_frequency: 1m
    require_point_in_time_data: true
  optional_data:
    - volatility.realized
    - liquidity.spread_bps
  tags:
    - tradable-alpha
    - momentum
    - intraday
    - tree-based
  leakage_risks:
    - bar_close_to_signal_timestamp_misalignment
    - vendor_replay_corrections_lookahead
  failure_modes:
    - dependency_warning_intraday_feed_required
    - stale_quote_or_trade_print_gaps
  compute_intensity: medium
  output_schema: alpha.signal.score.v1
  references:
    - https://xgboost.readthedocs.io/en/stable/
  params:
    - name: max_depth
      description: Maximum tree depth for each booster.
      type: integer
      default: 6
      bounds:
        min_value: 2
        max_value: 12
    - name: learning_rate
      description: Step size shrinkage applied after each boosting step.
      type: number
      default: 0.05
      bounds:
        min_value: 0.01
        max_value: 0.3
  
- model_family: linear_mean_reversion_zscore
  model_name: Linear Mean Reversion Z-Score
  description: Cross-sectional mean-reversion model using z-scored residual spreads and short-horizon reversal features.
  required_data:
    - price.close
    - returns.daily
    - timestamp
    - symbol
  dataset_requirement:
    required_fields:
      - price.close
      - returns.daily
    required_frequency: 1d
    require_point_in_time_data: true
  optional_data:
    - sector.classification
    - liquidity.adv20
  tags:
    - tradable-alpha
    - mean-reversion
    - linear
    - core-template
  leakage_risks:
    - same_day_close_execution_assumption
    - cross_sectional_normalization_future_peek
  failure_modes:
    - crowding_during_risk_off
    - regime_shift_breaks_reversion_speed
  compute_intensity: low
  output_schema: alpha.signal.score.v1
  references:
    - https://scikit-learn.org/stable/modules/linear_model.html
  params:
    - name: lookback_days
      description: Lookback window for z-score estimation.
      type: integer
      default: 20
      bounds:
        min_value: 5
        max_value: 120
    - name: entry_z
      description: Absolute z-score threshold for signal entry.
      type: number
      default: 1.5
      bounds:
        min_value: 0.5
        max_value: 4.0

- model_family: futures_carry_term_structure
  model_name: Futures Carry Term Structure
  description: Carry model from front-to-deferred futures term structure with roll-aware normalization.
  required_data:
    - futures.front_contract_price
    - futures.next_contract_price
    - futures.days_to_expiry
    - timestamp
    - symbol
  dataset_requirement:
    required_fields:
      - futures.front_contract_price
      - futures.next_contract_price
      - futures.days_to_expiry
    required_frequency: 1d
    require_point_in_time_data: true
  optional_data:
    - funding.rate_proxy
    - open_interest
  tags:
    - tradable-alpha
    - carry
    - futures
    - core-template
  leakage_risks:
    - back_adjustment_using_future_rolls
    - contract_chain_reconstruction_peek
  failure_modes:
    - contract_switch_discontinuities
    - dependency_warning_roll_calendar_required
  compute_intensity: low
  output_schema: alpha.signal.score.v1
  references:
    - https://www.cmegroup.com/education.html
  params:
    - name: min_days_to_expiry
      description: Minimum days to expiry for valid front contract sampling.
      type: integer
      default: 7
      bounds:
        min_value: 1
        max_value: 30

- model_family: elasticnet_cross_sectional_factor_alpha
  model_name: ElasticNet Cross-Sectional Factor Alpha
  description: Sparse factor alpha model with sector-neutralized exposures and turnover-aware shrinkage.
  required_data:
    - factors.cross_sectional
    - returns.forward_1d
    - timestamp
    - symbol
  dataset_requirement:
    required_fields:
      - factors.cross_sectional
      - returns.forward_1d
      - fundamentals.point_in_time
    required_frequency: 1d
    require_point_in_time_data: true
  optional_data:
    - sector.classification
    - country.classification
  tags:
    - tradable-alpha
    - factor
    - linear
    - core-template
  leakage_risks:
    - revised_fundamental_snapshot_leakage
    - rebalance_timestamp_execution_mismatch
  failure_modes:
    - factor_decay_post_crowding
    - unstable_coefficients_in_sparse_universes
  compute_intensity: low
  output_schema: alpha.factor_return_forecast.v1
  references:
    - https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.ElasticNet.html
  params:
    - name: alpha
      description: Total regularization strength.
      type: number
      default: 0.2
      bounds:
        min_value: 0.001
        max_value: 2.0
    - name: l1_ratio
      description: Mix between l1 and l2 penalties.
      type: number
      default: 0.6
      bounds:
        min_value: 0.0
        max_value: 1.0

- model_family: event_driven_earnings_drift
  model_name: Event-Driven Earnings Drift
  description: Post-earnings announcement drift model combining surprise magnitude, guidance tone, and liquidity filters.
  required_data:
    - earnings.surprise_pct
    - earnings.announcement_timestamp
    - returns.intraday_5m
    - symbol
  dataset_requirement:
    required_fields:
      - earnings.surprise_pct
      - earnings.announcement_timestamp
      - earnings.point_in_time_calendar
    required_frequency: event
    require_point_in_time_data: true
  optional_data:
    - analyst.revisions_7d
    - sentiment.guidance_tone
  tags:
    - tradable-alpha
    - event-driven
    - earnings
  leakage_risks:
    - announcement_time_timezone_shift
    - revised_eps_consensus_lookahead
  failure_modes:
    - dependency_requirement_earnings_feed_mandatory
    - overnight_gap_execution_slippage
  compute_intensity: medium
  output_schema: alpha.signal.score.v1
  references:
    - https://www.sec.gov/edgar/searchedgar/companysearch

