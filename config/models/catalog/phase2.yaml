- model_family: options_iv_skew_reversion
  model_name: Options IV Skew Reversion
  description: Relative-value alpha from implied-volatility skew dislocations and subsequent normalization.
  required_data:
    - options.iv_surface
    - options.skew_25d
    - options.open_interest
    - timestamp
    - symbol
  dataset_requirement:
    required_fields:
      - options.iv_surface
      - options.skew_25d
      - options.chain_snapshot_timestamp
    required_frequency: 5m
    require_point_in_time_data: true
  optional_data:
    - options.volume
    - realized_volatility_20d
  tags:
    - tradable-alpha
    - options
    - mean-reversion
  leakage_risks:
    - option_chain_restatement_lookahead
    - stale_surface_interpolation_bias
  failure_modes:
    - dependency_requirement_options_chain_mandatory
    - dependency_warning_intraday_options_quotes_required
  compute_intensity: high
  output_schema: alpha.signal.score.v1
  references:
    - https://www.theocc.com/market-data
