    - target.value
  optional_data:
    - regressors.exogenous
    - intervention.events
  tags:
    - bayesian
    - time-series
    - causal
  leakage_risks:
    - intervention_window_peek
    - retrospective_relabeling
  failure_modes:
    - prior_misspecification
    - wide_posterior_uncertainty
  compute_intensity: medium
  output_schema: decomposition.trend_seasonal_residual.v1
  references:
    - https://www.tensorflow.org/probability
    - https://research.google/pubs/pub41854/
