- id: phase1-001
  slug: xgboost-time-series
  model_family: xgboost_timeseries
  model_name: XGBoost Time Series
  description: Gradient-boosted tree forecaster with phase-1 warning templates for leakage and drift.
  supported_tasks:
    - forecasting.point
    - forecasting.interval
  required_data:
    - ohlcv.close
    - timestamp
  optional_data:
    - ohlcv.volume
    - macro.calendar
  default_parameters:
    objective: reg:squarederror
    n_estimators: 400
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
  tags:
    - tree-based
    - time-series
    - forecasting
  output_schema: forecast.point_and_interval.v1
  leakage_risks:
    - rolling_window_future_peek
    - target_encoding_leakage
  failure_modes:
    - concept_drift
    - unstable_feature_importance
  safety:
    controls:
      - purged_walk_forward_cv
      - point_in_time_feature_store
    checks:
      - enforce_feature_cutoff_timestamps
      - detect_label_overlap_across_splits
  validation:
    required:
      - rolling_origin_backtest
      - residual_bias_by_regime
    thresholds:
      min_interval_coverage: 0.8
      max_mape: 0.2
  compute_intensity: medium
  references:
    - https://xgboost.readthedocs.io/en/stable/
    - https://scikit-learn.org/stable/modules/generated/sklearn.model_selection.TimeSeriesSplit.html
  implementation_status: implemented
  quick_start_templates:
    - template_id: xgb_forecast_intraday_v1
      description: Intraday point+interval starter with lag and calendar features.

- id: phase1-002
  slug: lightgbm-quantile
  model_family: lightgbm_quantile
  model_name: LightGBM Quantile
  description: Quantile regression booster with reusable parameter templates and operational warnings.
  supported_tasks:
    - forecasting.quantile
    - risk.tail_estimation
  required_data:
    - ohlcv.close
    - timestamp
  optional_data:
    - known_future_covariates
    - event_flags
  default_parameters:
    objective: quantile
    n_estimators: 500
    learning_rate: 0.03
    num_leaves: 64
    min_data_in_leaf: 50
  tags:
    - tree-based
    - forecasting
    - quantile
  output_schema: forecast.quantiles.v1
  leakage_risks:
    - horizon_overlap
    - global_normalization_leakage
  failure_modes:
    - tail_miscalibration
    - sparse_event_overfit
  safety:
    controls:
      - embargo_between_train_validation_windows
      - quantile_monotonicity_postcheck
    checks:
      - future_covariate_availability_audit
      - split_level_scaler_fit_check
  validation:
    required:
      - pinball_loss_evaluation
      - empirical_quantile_coverage
    thresholds:
      p90_coverage_min: 0.85
      p10_coverage_min: 0.85
  compute_intensity: medium
  references:
    - https://lightgbm.readthedocs.io/
    - https://scikit-learn.org/stable/modules/calibration.html
  implementation_status: implemented
  quick_start_templates:
    - template_id: lgbm_quantile_daily_v1
      description: Daily quantile forecasting baseline with event flags.

- id: phase1-003
  slug: prophet-seasonality
  model_family: prophet_seasonality
  model_name: Prophet Seasonality
  description: Additive trend-seasonality model with holiday templates and warning checklists.
  supported_tasks:
    - forecasting.point
    - forecasting.interval
  required_data:
    - timestamp
    - target.value
  optional_data:
    - holiday.calendar
    - regressors.exogenous
  default_parameters:
    growth: linear
    seasonality_mode: additive
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
  tags:
    - classical
    - forecasting
    - seasonality
  output_schema: forecast.point_and_interval.v1
  leakage_risks:
    - future_holiday_feature_leakage
  failure_modes:
    - changepoint_overreaction
    - weak_short_horizon_fit
  safety:
    controls:
      - holiday_calendar_version_pinning
      - locked_forecast_cutoff
    checks:
      - verify_holiday_features_are_known_in_advance
      - changepoint_count_sanity_check
  validation:
    required:
      - horizon_stratified_backtest
      - holiday_effect_ablation
    thresholds:
      max_bias_abs: 0.05
      min_smape_improvement_vs_naive: 0.03
  compute_intensity: low
  references:
    - https://facebook.github.io/prophet/
    - https://peerj.com/preprints/3190/
  implementation_status: implemented
  quick_start_templates:
    - template_id: prophet_holiday_retail_v1
      description: Retail demand template with holiday/event regressors.

- id: phase1-004
  slug: lstm-sequence-forecaster
  model_family: lstm_sequence_forecaster
  model_name: LSTM Sequence Forecaster
  description: Recurrent neural forecaster with starter templates and phase-1 warning metadata.
  supported_tasks:
    - forecasting.quantile
    - forecasting.multi_horizon
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - known_future_covariates
    - static_covariates
  default_parameters:
    hidden_size: 128
    num_layers: 2
    dropout: 0.1
    sequence_length: 64
    learning_rate: 0.001
  tags:
    - deep-learning
    - recurrent
    - forecasting
  output_schema: forecast.quantiles.v1
  leakage_risks:
    - sequence_padding_leakage
    - scaler_fit_on_full_series
  failure_modes:
    - vanishing_gradients
    - cold_start_underfit
  safety:
    controls:
      - entity_disjoint_split_enforcement
      - per_split_normalizer_fit
    checks:
      - sequence_boundary_integrity
      - padded_token_mask_validation
  validation:
    required:
      - walk_forward_panel_backtest
      - quantile_calibration_curve
    thresholds:
      max_val_loss_gap: 0.15
      min_p50_coverage: 0.75
  compute_intensity: high
  references:
    - https://pytorch.org/docs/stable/generated/torch.nn.LSTM.html
    - https://www.tensorflow.org/api_docs/python/tf/keras/layers/LSTM
  implementation_status: implemented
  quick_start_templates:
    - template_id: lstm_panel_demand_v1
      description: Multi-entity demand forecasting starter with known-future covariates.

- id: phase1-005
  slug: temporal-fusion-transformer
  model_family: temporal_fusion_transformer
  model_name: Temporal Fusion Transformer
  description: Multi-horizon attention model with warning templates for covariate alignment.
  supported_tasks:
    - forecasting.quantile
    - forecasting.multi_horizon
    - feature_attribution
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - known_future_covariates
    - observed_covariates
    - static_covariates
  default_parameters:
    hidden_size: 64
    attention_head_size: 4
    dropout: 0.1
    max_encoder_length: 96
    learning_rate: 0.0008
  tags:
    - deep-learning
    - attention
    - forecasting
  output_schema: forecast.quantiles.v1
  leakage_risks:
    - known_future_covariate_mislabeling
    - target_scaler_forward_leakage
  failure_modes:
    - attention_instability
    - overparameterization_on_small_panels
  safety:
    controls:
      - strict_known_future_covariate_contract
      - feature_latency_registry_checks
    checks:
      - encoder_decoder_alignment_audit
      - per_horizon_calibration_monitor
  validation:
    required:
      - multi_horizon_backtest
      - ablation_static_vs_dynamic_features
    thresholds:
      min_coverage_p90: 0.85
      max_wql: 0.25
  compute_intensity: high
  references:
    - https://pytorch-forecasting.readthedocs.io/en/stable/api/pytorch_forecasting.models.temporal_fusion_transformer._tft.TemporalFusionTransformer.html
    - https://research.google/pubs/temporal-fusion-transformers-for-interpretable-multi-horizon-time-series-forecasting/
  implementation_status: implemented
  quick_start_templates:
    - template_id: tft_multi_store_weekly_v1
      description: Weekly multi-store template with static and known-future covariates.

- id: phase1-006
  slug: catboost-categorical-alpha
  model_family: catboost_categorical_alpha
  model_name: CatBoost Categorical Alpha
  description: Categorical-aware gradient booster with default templates and clear warning labels.
  supported_tasks:
    - forecasting.point
    - regression
  required_data:
    - target.value
    - timestamp
  optional_data:
    - categorical.identifiers
    - price.derived_features
  default_parameters:
    loss_function: RMSE
    depth: 8
    iterations: 500
    learning_rate: 0.05
    l2_leaf_reg: 3.0
  tags:
    - tree-based
    - categorical
    - regression
  output_schema: forecast.point.v1
  leakage_risks:
    - target_stat_leakage
    - temporal_fold_contamination
  failure_modes:
    - category_shift
    - unstable_online_updates
  safety:
    controls:
      - ordered_target_statistics_only
      - temporal_cv_enforcement
    checks:
      - category_cardinality_drift_check
      - rare_category_handling_validation
  validation:
    required:
      - rolling_window_backtest
      - subgroup_error_analysis
    thresholds:
      max_rmse: 0.08
      min_directional_accuracy: 0.55
  compute_intensity: medium
  references:
    - https://catboost.ai/
    - https://catboost.ai/docs/
  implementation_status: implemented
  quick_start_templates:
    - template_id: catboost_alpha_daily_v1
      description: Daily alpha regression starter with category handling defaults.

- id: phase1-007
  slug: elasticnet-factor-model
  model_family: elasticnet_factor_model
