- id: phase1-009
  slug: tcn-forecaster
  model_family: tcn_forecaster
  model_name: Temporal Convolutional Network Forecaster
  description: Dilated convolution forecaster with rollout templates and warning-ready metadata.
  supported_tasks:
    - forecasting.quantile
    - forecasting.multi_horizon
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - known_future_covariates
    - promotion.flags
  default_parameters:
    num_channels:
      - 64
      - 64
      - 128
    kernel_size: 3
    dropout: 0.15
    learning_rate: 0.001
  tags:
    - deep-learning
    - convolutional
    - forecasting
  output_schema: forecast.quantiles.v1
  leakage_risks:
    - teacher_forcing_future_leakage
    - window_index_misalignment
  failure_modes:
    - receptive_field_undercoverage
    - unstable_long_horizon_rollout
  safety:
    controls:
      - strict_teacher_forcing_disable_at_eval
      - horizon_index_alignment_checks
    checks:
      - receptive_field_vs_horizon_validator
