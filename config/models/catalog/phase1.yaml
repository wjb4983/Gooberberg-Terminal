  implementation_status: implemented
  quick_start_templates:
    - template_id: tcn_promo_demand_v1
      description: Promotion-aware demand forecasting starter using dilated convolutions.

- id: phase1-010
  slug: bayesian-structural-time-series
  model_family: bayesian_structural_time_series
  model_name: Bayesian Structural Time Series
  description: Probabilistic structural model with prior templates and explicit warning cues.
  supported_tasks:
    - forecasting.quantile
    - causal_inference
    - decomposition
  required_data:
    - timestamp
    - target.value
  optional_data:
    - regressors.exogenous
    - intervention.events
  default_parameters:
    n_samples: 2000
    burn_in: 500
    trend_component: local_linear
    seasonality_period: 7
  tags:
    - bayesian
    - time-series
    - causal
  output_schema: decomposition.trend_seasonal_residual.v1
  leakage_risks:
    - intervention_window_peek
    - retrospective_relabeling
  failure_modes:
    - prior_misspecification
    - wide_posterior_uncertainty
  safety:
    controls:
      - intervention_date_locking
      - prior_review_checklist
    checks:
      - posterior_predictive_check
      - sensitivity_to_prior_scale
  validation:
    required:
      - pre_post_intervention_backtest
      - posterior_coverage_test
    thresholds:
      min_posterior_coverage: 0.8
      max_counterfactual_bias: 0.06
  compute_intensity: medium
  references:
    - https://www.tensorflow.org/probability
    - https://research.google/pubs/pub41854/
  implementation_status: implemented
  quick_start_templates:
    - template_id: bsts_intervention_analysis_v1
      description: Intervention-effect estimation starter with trend/seasonal decomposition.
