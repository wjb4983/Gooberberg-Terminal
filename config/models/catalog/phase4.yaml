- model_family: tftx_temporal_moe
  model_name: TFTx Temporal MoE
  description: Mixture-of-experts extension of temporal transformers for adaptive multi-regime forecasting.
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - known_future_covariates
    - static_covariates
  tags:
    - deep-learning
    - transformer
    - forecasting
    - planned
    - experimental
  leakage_risks:
    - regime_gate_trained_on_future_labels
    - covariate_availability_mislabeling
  failure_modes:
    - expert_collapse
    - unstable_gate_switching
  compute_intensity: high
  output_schema: forecast.quantiles.v1
  references:
    - https://arxiv.org/abs/1912.09363
    - https://pytorch-forecasting.readthedocs.io/

- model_family: tiny_time_mix_patch_encoder
  model_name: TinyTimeMix Patch Encoder
  description: Lightweight patch-mixing encoder for low-latency horizon forecasting on edge workloads.
  required_data:
    - timestamp
    - target.value
  optional_data:
    - entity_id
    - observed_covariates
  tags:
    - deep-learning
    - patch-model
    - forecasting
    - planned
    - experimental
  leakage_risks:
    - patch_stride_future_overlap
    - streaming_normalizer_drift_leakage
  failure_modes:
    - horizon_aliasing
    - degraded_long_context_recall
  compute_intensity: medium
  output_schema: forecast.point_and_interval.v1
  references:
    - https://arxiv.org/abs/2306.09364
    - https://nixtlaverse.nixtla.io/neuralforecast/

- model_family: wavelet_diffusion_forecaster
  model_name: Wavelet Diffusion Forecaster
  description: Diffusion-based probabilistic model over wavelet components for multimodal scenario generation.
  required_data:
    - entity_id
    - timestamp
    - target.value
  optional_data:
    - known_future_covariates
    - event_flags
  tags:
    - generative
    - probabilistic
    - forecasting
    - planned
    - experimental
  leakage_risks:
    - denoising_schedule_calibrated_on_test_period
    - decomposition_window_lookahead
  failure_modes:
    - mode_collapse_under_low_signal
    - slow_sampling_inference
  compute_intensity: high
  output_schema: forecast.distribution.v1
  references:
    - https://arxiv.org/abs/2006.11239
    - https://arxiv.org/abs/2205.09991

- model_family: online_bayesian_changepoint_hazard
  model_name: Online Bayesian Changepoint Hazard
  description: Sequential changepoint detector with hazard priors for adaptive drift-aware forecasting pipelines.
  required_data:
    - timestamp
    - target.value
  optional_data:
    - exogenous.signals
    - entity_id
  tags:
    - bayesian
    - changepoint
    - planned
  leakage_risks:
    - retrospective_hazard_tuning
    - segment_boundary_future_peek
  failure_modes:
    - excessive_false_positive_segments
    - delayed_break_detection
  compute_intensity: low
  output_schema: regime.change_probability.v1
  references:
    - https://arxiv.org/abs/0710.3742
    - https://proceedings.neurips.cc/paper/2007/file/4f285f72e01f49e8bf8f7f27f4f4f6f7-Paper.pdf

- model_family: pooled_hierarchical_reconciliation
  model_name: Pooled Hierarchical Reconciliation
  description: Coherent top-down and bottom-up reconciliation layer for grouped panel forecasts.
  required_data:
    - entity_id
    - timestamp
    - target.value
    - hierarchy.parent_id
  optional_data:
    - hierarchy.level
    - base_model.point_forecast
  tags:
    - hierarchical
    - forecasting
    - planned
  leakage_risks:
    - hierarchy_snapshot_taken_post_horizon
    - reconciliation_weights_fit_on_eval
  failure_modes:
    - incoherent_updates_after_reorg
    - high_variance_bottom_level_adjustments
  compute_intensity: medium
  output_schema: forecast.reconciled.v1
  references:
    - https://otexts.com/fpp3/hierarchical.html
    - https://robjhyndman.com/publications/nnmint/

- model_family: retrieval_augmented_regime_classifier
  model_name: Retrieval Augmented Regime Classifier
  description: Regime classifier combining live features with nearest historical episodes from a vector index.
  required_data:
    - timestamp
    - returns.log
    - volatility.realized
  optional_data:
    - embeddings.market_state
    - liquidity.metrics
  tags:
    - classification
    - retrieval
    - planned
    - experimental
  leakage_risks:
    - retrieval_index_contains_future_windows
    - embedding_model_fit_on_holdout
  failure_modes:
    - neighbor_drift_under_new_regimes
    - brittle_similarity_metric
  compute_intensity: medium
  output_schema: regime.class_probabilities.v1
  references:
    - https://arxiv.org/abs/2005.11401
    - https://faiss.ai/

