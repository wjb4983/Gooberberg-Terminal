- model_family: synthetic_control_bayesian_dynamic
  model_name: Synthetic Control Bayesian Dynamic
  description: Bayesian dynamic synthetic control for intervention impact analysis under non-stationary baselines.
  required_data:
    - timestamp
    - target.value
    - intervention.flag
  optional_data:
    - donor_pool.series
    - covariates.pre_treatment
  tags:
    - causal
    - bayesian
    - planned
    - experimental
  leakage_risks:
    - donor_selection_using_post_period_fit
    - intervention_date_relabeling
  failure_modes:
    - weak_donor_overlap
    - posterior_instability_with_short_preperiod
  compute_intensity: medium
  output_schema: causal_effect.posterior.v1
  references:
    - https://www.aeaweb.org/articles?id=10.1257/jep.31.2.391
    - https://arxiv.org/abs/2211.05984
