[tool.black]
line-length = 100
target-version = ["py311"]
include = "\\.pyi?$"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
check_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
strict_optional = true
mypy_path = [
  "apps/api-control-plane/src",
  "services/orchestrator/src",
  "services/worker-research/src",
  "services/worker-training/src",
  "services/service-inference-live/src",
  "services/service-portfolio-state/src",
  "services/service-risk-exec/src",
  "services/service-data/src",
  "libs/py/gb_core/src",
  "libs/py/gb_io/src",
  "libs/py/gb_clients/src",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = [
  "apps/api-control-plane/tests",
  "services/orchestrator/tests",
  "services/worker-research/tests",
  "services/worker-training/tests",
  "services/service-inference-live/tests",
  "services/service-portfolio-state/tests",
  "services/service-risk-exec/tests",
  "services/service-data/tests",
  "libs/py/gb_core/tests",
  "libs/py/gb_io/tests",
  "libs/py/gb_clients/tests",
]
pythonpath = [
  "apps/api-control-plane/src",
  "services/orchestrator/src",
  "services/worker-research/src",
  "services/worker-training/src",
  "services/service-inference-live/src",
  "services/service-portfolio-state/src",
  "services/service-risk-exec/src",
  "services/service-data/src",
  "libs/py/gb_core/src",
  "libs/py/gb_io/src",
  "libs/py/gb_clients/src",
]
