name: gooberberg-local-server

x-default-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

x-default-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "1.00"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

services:
  api-control-plane:
    image: ghcr.io/gooberberg/api-control-plane:latest
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    environment:
      GB_ENVIRONMENT: production
      GB_APP_VERSION: ${GB_APP_VERSION:-0.1.0}
      GB_API_PREFIX: ${GB_API_PREFIX:-/api/v1}
      GB_API_AUTH_TOKEN: ${GB_API_AUTH_TOKEN:?set_a_strong_token}
      GB_API_AUTH_SCOPE: ${GB_API_AUTH_SCOPE:-control-plane:full}
      GB_CORS_ALLOWED_ORIGINS: ${GB_CORS_ALLOWED_ORIGINS:-http://localhost:1420,http://127.0.0.1:1420,tauri://localhost,http://tauri.localhost,https://tauri.localhost}
      GB_POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set_postgres_password}@postgres:5432/${POSTGRES_DB:-gooberberg}
      GB_REDIS_DSN: redis://redis:6379/0
      GB_HEARTBEAT_INTERVAL_SECONDS: ${GB_HEARTBEAT_INTERVAL_SECONDS:-15}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_BIND_IP:-127.0.0.1}:${API_BIND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gb-local-private
    <<: [*default-logging, *default-resources]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gooberberg}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_postgres_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gooberberg}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    expose:
      - "5432"
    networks:
      - gb-local-private
    <<: [*default-logging]
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    expose:
      - "6379"
    networks:
      - gb-local-private
    <<: [*default-logging]
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

networks:
  gb-local-private:
    driver: bridge
    internal: true

volumes:
  postgres-data:
    name: gb-local-postgres-data
  redis-data:
    name: gb-local-redis-data
